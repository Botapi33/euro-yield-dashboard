<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BondStats | Euro Yield Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ================= BASE ================= */

body{
margin:0;
font-family:Inter,system-ui;
background:linear-gradient(180deg,#050d16,#0a1a2b);
color:#eef4fb;
}

/* ================= CONTAINER ================= */

.wrap{
max-width:900px;
margin:auto;
padding:25px 16px;
}

/* ================= HEADER ================= */

.title{
font-size:26px;
font-weight:600;
}

.subtitle{
font-size:12px;
color:#8fa6c0;
margin-top:4px;
}

/* ================= METRICS ================= */

.metrics{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:16px;
}

.metric{
background:rgba(15,30,50,0.85);
border:1px solid rgba(255,255,255,0.05);
border-radius:10px;
padding:12px;
}

.metric-label{
font-size:10px;
color:#8fa6c0;
text-transform:uppercase;
}

.metric-value{
font-size:18px;
margin-top:4px;
font-weight:600;
}

.metric-change{
font-size:12px;
margin-top:3px;
}

.pos{color:#5be37d;}
.neg{color:#ff6b6b;}

/* ================= CONTROLS ================= */

.controls{
margin-top:15px;
display:flex;
gap:6px;
}

.btn{
border:1px solid rgba(255,255,255,0.08);
background:none;
color:#8fa6c0;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
font-size:11px;
}

.btn.active{
border-color:#5be37d;
color:#fff;
}

/* ================= CHART ================= */

.chart-box{
margin-top:12px;
background:rgba(15,30,50,0.9);
border-radius:12px;
padding:12px;
border:1px solid rgba(255,255,255,0.05);
height:220px;
}

canvas{
width:100% !important;
height:100% !important;
}

/* ================= SIGNAL ================= */

.signal{
margin-top:14px;
padding:12px;
background:rgba(255,255,255,0.03);
border-radius:10px;
font-size:12px;
line-height:1.5;
color:#c7d5e6;
}

/* ================= FOOTER ================= */

.footer{
margin-top:10px;
font-size:10px;
color:#6f859f;
}

</style>
</head>

<body>

<div class="wrap">

<div class="title">Euro Yield Dashboard</div>
<div class="subtitle">Daily ECB sovereign yield monitoring</div>

<div class="metrics" id="metrics"></div>

<div class="controls">
<button class="btn active" onclick="setRange(7)">1W</button>
<button class="btn" onclick="setRange(30)">1M</button>
<button class="btn" onclick="setRange(90)">3M</button>
<button class="btn" onclick="setRange(365)">1Y</button>
</div>

<div class="chart-box">
<canvas id="chart"></canvas>
</div>

<div class="signal" id="signalText"></div>

<div class="footer">
ECB Data · Daily (T-1)
</div>

</div>

<script>

/* ================= STATE ================= */

let chart;
let range = 30;

/* ================= FETCH ECB ================= */

async function fetchECB(){

const url = "https://data-api.ecb.europa.eu/service/data/YC/B.U2.EUR.4F.G_N_A.SV_C_YM.SR_10Y?format=jsondata";

const res = await fetch(url);
const data = await res.json();

const series = Object.values(data.dataSets[0].series)[0];
const obs = series.observations;
const time = data.structure.dimensions.observation[0].values;

const keys = Object.keys(obs).map(Number).sort((a,b)=>a-b);
const sliced = keys.slice(-range);

return sliced.map(k=>({
date:time[k].id,
value:obs[k][0]
}));

}

/* ================= CHART ================= */

function createChart(ctx,data){

const gradient = ctx.createLinearGradient(0,0,0,220);
gradient.addColorStop(0,"rgba(91,227,125,0.35)");
gradient.addColorStop(1,"rgba(91,227,125,0)");

return new Chart(ctx,{
type:"line",
data:{
labels:data.map(d=>d.date),
datasets:[{
data:data.map(d=>d.value),
borderColor:"#5be37d",
backgroundColor:gradient,
fill:true,
borderWidth:1.8,
pointRadius:0,
tension:0.15
}]
},
options:{
responsive:true,
plugins:{
legend:{display:false}
},
scales:{
x:{display:false},
y:{
ticks:{
color:"#8fa6c0",
callback:v=>v.toFixed(2)+"%"
},
grid:{color:"rgba(255,255,255,0.04)"}
}
}
}
});

}

/* ================= SIGNAL ENGINE ================= */

function getSignal(change,trend){

if(change > 0 && trend > 0){
return "↑ Rising yields with momentum. Financial conditions tightening.";
}

if(change > 0){
return "↑ Short-term yield increase. Monitoring continuation risk.";
}

if(change < 0 && trend < 0){
return "↓ Yields declining. Conditions easing across Euro area.";
}

if(change < 0){
return "↓ Mild pullback in yields. No strong trend confirmation.";
}

return "→ Stable yield environment with low directional conviction.";

}

/* ================= LOAD ================= */

async function load(){

const data = await fetchECB();

const latest = data[data.length-1];
const prev = data[data.length-2];

const change = latest.value - prev.value;
const trend = latest.value - data[0].value;

/* ===== METRICS ===== */

document.getElementById("metrics").innerHTML = `
<div class="metric">
<div class="metric-label">Yield</div>
<div class="metric-value">${latest.value.toFixed(2)}%</div>
</div>

<div class="metric">
<div class="metric-label">Daily</div>
<div class="metric-value ${change>0?"pos":"neg"}">
${change.toFixed(2)}
</div>
</div>

<div class="metric">
<div class="metric-label">Updated</div>
<div class="metric-value">${latest.date}</div>
</div>
`;

/* ===== CHART ===== */

if(chart) chart.destroy();
chart = createChart(document.getElementById("chart").getContext("2d"),data);

/* ===== SIGNAL ===== */

document.getElementById("signalText").innerText =
getSignal(change,trend);

}

/* ================= RANGE ================= */

function setRange(r){

range = r;

document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");

load();

}

/* INIT */
load();

</script>

</body>
</html>
