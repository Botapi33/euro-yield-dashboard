<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BondStats | Euro Yield Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family:Inter,sans-serif;
  background:#07121f;
  color:#eef4fb;
}

/* CONTAINER (EMBED READY) */
.wrap {
  max-width:900px;
  margin:auto;
  padding:25px;
}

/* HEADER */
.title {
  font-size:26px;
  font-weight:600;
}

.subtitle {
  color:#8fa6c0;
  font-size:14px;
  margin-top:4px;
}

/* METRICS */
.metrics {
  display:flex;
  gap:20px;
  margin-top:20px;
}

.metric {
  flex:1;
  background:#0f2238;
  padding:15px;
  border-radius:12px;
}

.metric-label {
  font-size:12px;
  color:#8fa6c0;
}

.metric-value {
  font-size:22px;
  font-weight:600;
}

/* BUTTONS */
.controls {
  margin-top:20px;
}

.btn {
  border:1px solid rgba(255,255,255,0.1);
  background:none;
  color:#8fa6c0;
  padding:6px 12px;
  margin-right:6px;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.btn.active {
  border-color:#5be37d;
  color:#fff;
}

/* CHART */
.chart-box {
  margin-top:15px;
  background:#0f2238;
  padding:15px;
  border-radius:12px;
}

canvas {
  height:220px !important;
}

/* ANALYSIS */
.analysis {
  margin-top:20px;
  font-size:13px;
  color:#c6d4e5;
  line-height:1.5;
}
</style>
</head>

<body>

<div class="wrap">

<div class="title">Euro 10Y Yield Monitor</div>
<div class="subtitle">Daily sovereign yield tracking (ECB data)</div>

<div class="metrics" id="metrics"></div>

<div class="controls">
  <button class="btn active" onclick="setRange(7)">1W</button>
  <button class="btn" onclick="setRange(30)">1M</button>
  <button class="btn" onclick="setRange(90)">3M</button>
  <button class="btn" onclick="setRange(365)">1Y</button>
</div>

<div class="chart-box">
  <canvas id="chart"></canvas>
</div>

<div class="analysis" id="analysis"></div>

</div>

<script>

let range = 30;
let chart;

// ---------- ECB FETCH ----------

async function fetchECB() {

const url = "https://data-api.ecb.europa.eu/service/data/YC/B.U2.EUR.4F.G_N_A.SV_C_YM.SR_10Y?format=jsondata";

const res = await fetch(url);
const data = await res.json();

const series = Object.values(data.dataSets[0].series)[0];
const obs = series.observations;
const time = data.structure.dimensions.observation[0].values;

const keys = Object.keys(obs).map(Number).sort((a,b)=>a-b);
const slice = keys.slice(-range);

return slice.map(k => ({
  date: time[k].id,
  value: obs[k][0]
}));

}

// ---------- MAIN ----------

async function load(){

const data = await fetchECB();

const latest = data[data.length-1];
const prev = data[data.length-2];

const change = latest.value - prev.value;

// ---------- METRICS ----------

document.getElementById("metrics").innerHTML = `
<div class="metric">
<div class="metric-label">Current Yield</div>
<div class="metric-value">${latest.value.toFixed(2)}%</div>
</div>

<div class="metric">
<div class="metric-label">Daily Change</div>
<div class="metric-value" style="color:${change>0?'#5be37d':'#ff6b6b'}">
${change.toFixed(2)}
</div>
</div>

<div class="metric">
<div class="metric-label">Last Update</div>
<div class="metric-value">${latest.date}</div>
</div>
`;

// ---------- CHART ----------

if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"), {
  type:"line",
  data:{
    labels:data.map(d=>d.date),
    datasets:[{
      data:data.map(d=>d.value),
      borderColor:"#5be37d",
      borderWidth:2,
      pointRadius:0,
      tension:0.3
    }]
  },
  options:{
    plugins:{legend:{display:false}},
    scales:{
      x:{display:false},
      y:{ticks:{color:"#8fa6c0"}}
    }
  }
});

// ---------- ANALYSIS ----------

let text = "";

if(change > 0){
  text = "Euro area yields are rising, indicating tightening financial conditions.";
}else{
  text = "Euro area yields are easing, suggesting softer financial conditions.";
}

document.getElementById("analysis").innerText = text;

}

// ---------- RANGE ----------

function setRange(r){
range = r;

document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");

load();
}

load();

</script>

</body>
</html>
