<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>European Yield Intelligence | BondStats</title>

<style>
:root{
--bg1:#06111d;
--bg2:#0b1626;
--panel:rgba(12,24,40,0.95);
--border:rgba(138,170,215,0.18);
--text:#eef4fb;
--muted:#9bb0c8;
--green:#5be37d;
--red:#ff6b6b;
--accent:#89b8ff;
}

body{
margin:0;
font-family:Inter,sans-serif;
background:linear-gradient(180deg,var(--bg1),var(--bg2));
color:var(--text);
}

.wrap{
max-width:1400px;
margin:auto;
padding:40px 20px;
}

h1{
font-size:48px;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:var(--panel);
border-radius:20px;
padding:22px;
border:1px solid var(--border);
transition:.2s;
}

.card:hover{
transform:translateY(-3px);
border-color:rgba(166,197,238,0.3);
}

.label{color:var(--muted);font-size:13px;}
.value{font-size:34px;font-weight:700;margin-top:5px;}
.sub{margin-top:8px;color:var(--muted);font-size:14px;}

.pos{color:var(--green);}
.neg{color:var(--red);}

.section{margin-top:40px;}

.analysis{
background:rgba(255,255,255,0.03);
padding:22px;
border-radius:16px;
line-height:1.7;
font-size:17px;
}
</style>
</head>

<body>

<div class="wrap">

<h1>European Yield Intelligence</h1>
<p class="sub">Real-time ECB yield curve + sovereign spread system</p>

<div class="section">
<h2>Euro Area Curve</h2>
<div class="grid" id="core"></div>
</div>

<div class="section">
<h2>Country Curve</h2>
<div class="grid" id="countries"></div>
</div>

<div class="section">
<h2>Fragmentation</h2>
<div class="grid" id="spreads"></div>
</div>

<div class="section">
<h2>Market Interpretation</h2>
<div class="analysis" id="analysis"></div>
</div>

</div>

<script>

// -------- CONFIG --------

const JSON_URL = "https://botapi33.github.io/bondstats-global-yields/global_yields.json";

// -------- ECB FETCH --------

async function fetchECB(country, maturity){
const url = `https://data-api.ecb.europa.eu/service/data/YC/B.${country}.EUR.4F.G_N_A.SV_C_YM.SR_${maturity}?format=jsondata`;

const res = await fetch(url);
const data = await res.json();

const series = Object.values(data.dataSets[0].series)[0];
const obs = series.observations;

const keys = Object.keys(obs).map(Number).sort((a,b)=>a-b);

const latest = keys[keys.length-1];
const prev = keys[keys.length-2];

const time = data.structure.dimensions.observation[0].values;

return {
date: time[latest].id,
value: obs[latest][0],
prev: obs[prev][0]
};
}

// -------- UI --------

function card(title,value,sub="",cls=""){
return `
<div class="card">
<div class="label">${title}</div>
<div class="value ${cls}">${value}</div>
<div class="sub">${sub}</div>
</div>`;
}

// -------- SIGNALS --------

function curveSignal(x){
if(x < 0) return ["Inverted","neg"];
if(x < 0.5) return ["Flat",""];
return ["Normal","pos"];
}

function spreadSignal(x){
if(x > 2) return ["High Risk","neg"];
if(x > 1) return ["Moderate",""];
return ["Low","pos"];
}

// -------- MAIN --------

async function run(){

const json = await fetch(JSON_URL);
const data = await json.json();

const countries = data.countries;

// ECB REAL DATA
const euro10 = await fetchECB("U2","10Y");
const euro2 = await fetchECB("U2","2Y");

const de10 = await fetchECB("DE","10Y");
const de2 = await fetchECB("DE","2Y");

const fr10 = await fetchECB("FR","10Y");
const fr2 = await fetchECB("FR","2Y");

const it10 = await fetchECB("IT","10Y");
const it2 = await fetchECB("IT","2Y");

const es10 = await fetchECB("ES","10Y");
const es2 = await fetchECB("ES","2Y");

// ---- CORE ----

const curve = euro10.value - euro2.value;
const [curveTxt,curveCls] = curveSignal(curve);

document.getElementById("core").innerHTML =
card("Euro 10Y", euro10.value.toFixed(2)+"%") +
card("Euro 2Y", euro2.value.toFixed(2)+"%") +
card("Curve", curve.toFixed(2), curveTxt, curveCls);

// ---- COUNTRIES ----

function c(name,y10,y2){
const sp = y10.value - y2.value;
return card(name,
y10.value.toFixed(2)+"%",
"2Y: "+y2.value.toFixed(2)+" | Spread: "+sp.toFixed(2));
}

document.getElementById("countries").innerHTML =
c("Germany",de10,de2)+
c("France",fr10,fr2)+
c("Italy",it10,it2)+
c("Spain",es10,es2);

// ---- SPREADS ----

const itSpread = it10.value - de10.value;
const frSpread = fr10.value - de10.value;
const esSpread = es10.value - de10.value;

function s(name,val){
const [txt,cls] = spreadSignal(val);
return card(name,val.toFixed(2)+"%",txt,cls);
}

document.getElementById("spreads").innerHTML =
s("Italy vs Germany",itSpread)+
s("France vs Germany",frSpread)+
s("Spain vs Germany",esSpread);

// ---- ANALYSIS ----

let text = "";

if(curve < 0){
text += "The euro area yield curve is inverted, signaling restrictive monetary conditions. ";
}else if(curve < 0.5){
text += "The curve remains flat, indicating a transition phase in monetary policy. ";
}else{
text += "The yield curve is upward sloping, reflecting stable macro conditions. ";
}

if(itSpread > 2){
text += "Peripheral spreads indicate elevated fragmentation risk.";
}else if(itSpread > 1){
text += "Moderate fragmentation persists across euro sovereigns.";
}else{
text += "Fragmentation remains contained.";
}

document.getElementById("analysis").innerText = text;

}

run();

</script>

</body>
</html>
