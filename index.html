<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BondStats | European Yield Intelligence</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family: Inter, sans-serif;
  background: linear-gradient(180deg,#07121f,#0b1b2f);
  color:#eef4fb;
}

/* ---------- HEADER ---------- */

.header {
  padding:40px 60px;
}

.title {
  font-size:48px;
  font-weight:700;
}

.subtitle {
  color:#9bb0c8;
  margin-top:10px;
}

/* ---------- GRID ---------- */

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  padding:20px 60px;
}

.card {
  background: rgba(20,40,70,0.9);
  border-radius:20px;
  padding:22px;
  border:1px solid rgba(255,255,255,0.08);
}

.label {
  color:#9bb0c8;
  font-size:13px;
}

.value {
  font-size:36px;
  font-weight:700;
}

.pos {color:#5be37d;}
.neg {color:#ff6b6b;}

/* ---------- CHART ---------- */

.chart-container {
  padding:40px 60px;
}

.chart-box {
  background: rgba(20,40,70,0.9);
  padding:30px;
  border-radius:20px;
}

/* ---------- BUTTONS ---------- */

.time-buttons {
  margin-bottom:20px;
}

.btn {
  background:transparent;
  border:1px solid rgba(255,255,255,0.1);
  color:#9bb0c8;
  padding:8px 14px;
  margin-right:10px;
  border-radius:8px;
  cursor:pointer;
}

.btn.active {
  border-color:#89b8ff;
  color:#fff;
}

/* ---------- ANALYSIS ---------- */

.analysis {
  margin:40px 60px;
  background:rgba(255,255,255,0.03);
  padding:25px;
  border-radius:16px;
  line-height:1.6;
  font-size:16px;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">European Yield Intelligence</div>
  <div class="subtitle">ECB Yield Curve, Spread & Market Signals</div>
</div>

<div class="grid" id="metrics"></div>

<div class="chart-container">
  <div class="chart-box">
    <div class="time-buttons">
      <button class="btn active" onclick="setRange(30)">1M</button>
      <button class="btn" onclick="setRange(90)">3M</button>
      <button class="btn" onclick="setRange(365)">1Y</button>
    </div>
    <canvas id="chart"></canvas>
  </div>
</div>

<div class="analysis" id="analysis"></div>

<script>

let chart;
let range = 30;

// ---------- ECB FETCH ----------

async function fetchECBSeries(code, maturity){

const url = `https://data-api.ecb.europa.eu/service/data/YC/B.${code}.EUR.4F.G_N_A.SV_C_YM.SR_${maturity}?format=jsondata`;

const res = await fetch(url);
const data = await res.json();

const series = Object.values(data.dataSets[0].series)[0];
const obs = series.observations;
const time = data.structure.dimensions.observation[0].values;

const keys = Object.keys(obs).map(Number).sort((a,b)=>a-b);

const slice = keys.slice(-range);

return slice.map(k => ({
  date: time[k].id,
  value: obs[k][0]
}));
}

// ---------- LOAD ----------

async function load(){

const y10 = await fetchECBSeries("U2","10Y");
const y2 = await fetchECBSeries("U2","2Y");

const latest10 = y10[y10.length-1].value;
const latest2 = y2[y2.length-1].value;
const curve = latest10 - latest2;

// ---------- METRICS ----------

document.getElementById("metrics").innerHTML = `
<div class="card">
<div class="label">Euro 10Y</div>
<div class="value">${latest10.toFixed(2)}%</div>
</div>

<div class="card">
<div class="label">Euro 2Y</div>
<div class="value">${latest2.toFixed(2)}%</div>
</div>

<div class="card">
<div class="label">Curve</div>
<div class="value ${curve<0?"neg":"pos"}">${curve.toFixed(2)}</div>
</div>
`;

// ---------- CHART ----------

const labels = y10.map(d=>d.date);

if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"), {
  type:"line",
  data:{
    labels:labels,
    datasets:[
      {
        label:"10Y",
        data:y10.map(d=>d.value),
        borderWidth:2,
        tension:0.3
      },
      {
        label:"2Y",
        data:y2.map(d=>d.value),
        borderWidth:2,
        tension:0.3
      }
    ]
  },
  options:{
    plugins:{
      legend:{labels:{color:"#fff"}}
    },
    scales:{
      x:{ticks:{color:"#9bb0c8"}},
      y:{ticks:{color:"#9bb0c8"}}
    }
  }
});

// ---------- ANALYSIS ----------

let text = "";

if(curve < 0){
text = "Yield curve inverted → restrictive policy, recession risk rising.";
}
else if(curve < 0.5){
text = "Curve flat → transition phase in monetary policy.";
}
else{
text = "Normal upward curve → stable macro environment.";
}

document.getElementById("analysis").innerText = text;

}

// ---------- RANGE SWITCH ----------

function setRange(r){
range = r;

document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");

load();
}

load();

</script>

</body>
</html>
