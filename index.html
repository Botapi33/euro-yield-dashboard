<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>European Yield Curve Intelligence | BondStats</title>

<style>
:root {
  --bg:#050d16;
  --panel:#0f2238;
  --border:rgba(255,255,255,0.08);
  --text:#eef4fb;
  --muted:#9bb0c8;
  --green:#5be37d;
  --red:#ff6b6b;
  --blue:#89b8ff;
}

body {
  margin:0;
  font-family:Inter, sans-serif;
  background:radial-gradient(circle at top,#0b1a2b,#050d16);
  color:var(--text);
}

.wrap {
  max-width:1400px;
  margin:auto;
  padding:40px 20px;
}

h1 {
  font-size:48px;
  margin-bottom:10px;
}

.section {
  margin-top:40px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.card {
  background:var(--panel);
  border-radius:20px;
  padding:22px;
  border:1px solid var(--border);
  transition:.2s;
}

.card:hover {
  transform:translateY(-3px);
  border-color:rgba(137,184,255,0.3);
}

.label {
  color:var(--muted);
  font-size:13px;
  margin-bottom:8px;
}

.value {
  font-size:34px;
  font-weight:700;
}

.sub {
  margin-top:8px;
  color:var(--muted);
  font-size:14px;
}

.positive { color:var(--green); }
.negative { color:var(--red); }

.analysis {
  background:rgba(255,255,255,0.03);
  padding:22px;
  border-radius:16px;
  line-height:1.7;
}

.big {
  font-size:18px;
}
</style>
</head>

<body>

<div class="wrap">

<h1>European Yield Curve Intelligence</h1>
<p class="sub">ECB-based sovereign yield structure, curve signals and fragmentation analysis</p>

<div class="section">
<h2>Core Curve Metrics</h2>
<div class="grid" id="core"></div>
</div>

<div class="section">
<h2>Country Yield Structure</h2>
<div class="grid" id="countries"></div>
</div>

<div class="section">
<h2>Fragmentation Engine</h2>
<div class="grid" id="fragmentation"></div>
</div>

<div class="section">
<h2>Market Interpretation Engine</h2>
<div class="analysis" id="analysis"></div>
</div>

</div>

<script>

const JSON_URL = "https://YOUR_JSON_URL/global_yields.json";

async function load() {
  const res = await fetch(JSON_URL);
  const data = await res.json();
  return data.countries;
}

function card(title, value, sub="", cls="") {
  return `
  <div class="card">
    <div class="label">${title}</div>
    <div class="value ${cls}">${value}</div>
    <div class="sub">${sub}</div>
  </div>`;
}

// ---------- SIGNAL ENGINE ----------

function curveSignal(spread){
  if(spread < 0) return ["Inverted Curve","negative"];
  if(spread < 0.5) return ["Flat Curve",""];
  return ["Normal Curve","positive"];
}

function fragmentationSignal(spread){
  if(spread > 2) return ["High Fragmentation","negative"];
  if(spread > 1) return ["Moderate Fragmentation",""];
  return ["Low Fragmentation","positive"];
}

// ---------- MAIN ----------

load().then(c => {

  const euro10 = c.euro_area.value;

  // Placeholder 2Y (replace later with real ECB 2Y)
  const euro2 = euro10 - 0.6;

  const curve = euro10 - euro2;

  const [curveText, curveClass] = curveSignal(curve);

  document.getElementById("core").innerHTML =
    card("Euro Area 10Y", euro10.toFixed(2)+"%") +
    card("Euro Area 2Y", euro2.toFixed(2)+"%") +
    card("Curve (10Y-2Y)", curve.toFixed(2), curveText, curveClass);

  const germany = c.germany.value;

  function country(name,val){
    const spread = val - germany;
    return card(
      name,
      val.toFixed(2)+"%",
      "Spread vs DE: "+spread.toFixed(2)
    );
  }

  document.getElementById("countries").innerHTML =
    country("Germany",germany)+
    country("France",c.france.value)+
    country("Italy",c.italy.value)+
    country("Spain",c.spain.value);

  const itSpread = c.italy.value - germany;
  const spSpread = c.spain.value - germany;
  const frSpread = c.france.value - germany;

  function spreadCard(name,val){
    const [txt,cls] = fragmentationSignal(val);
    return card(name,val.toFixed(2)+"%",txt,cls);
  }

  document.getElementById("fragmentation").innerHTML =
    spreadCard("Italy vs Germany",itSpread)+
    spreadCard("Spain vs Germany",spSpread)+
    spreadCard("France vs Germany",frSpread);

  // ---------- INTERPRETATION ----------

  let text = "";

  if(curve < 0){
    text += "The euro area yield curve is currently inverted, indicating restrictive monetary policy conditions and potential recession sensitivity. ";
  } else if(curve < 0.5){
    text += "The yield curve remains flat, suggesting a transition phase between tightening and stabilization. ";
  } else {
    text += "The yield curve is upward sloping, indicating relatively normal macro conditions. ";
  }

  if(itSpread > 2){
    text += "Peripheral spreads, particularly Italy, indicate elevated fragmentation risk within the euro area bond market.";
  } else if(itSpread > 1){
    text += "Moderate fragmentation is visible in peripheral sovereign spreads.";
  } else {
    text += "Fragmentation remains limited across euro area sovereign bonds.";
  }

  document.getElementById("analysis").innerHTML = "<span class='big'>"+text+"</span>";

});

</script>

</body>
</html>
