<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BondStats | Euro Yield</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== BASE ===== */

body{
margin:0;
font-family:Inter,system-ui;
background:#06121f;
color:#e6edf5;
}

.wrap{
max-width:880px;
margin:auto;
padding:20px;
}

/* ===== HEADER ===== */

.title{
font-size:20px;
font-weight:600;
}

.subtitle{
font-size:12px;
color:#7f96b2;
margin-top:3px;
}

/* ===== METRICS ===== */

.metrics{
display:flex;
gap:20px;
margin-top:12px;
font-size:13px;
color:#9fb2c9;
flex-wrap:wrap;
}

.metrics b{
color:#fff;
font-weight:500;
}

/* ===== CONTROLS ===== */

.controls{
margin-top:12px;
}

.btn{
background:none;
border:none;
color:#7f96b2;
font-size:12px;
margin-right:10px;
cursor:pointer;
padding:0;
}

.btn.active{
color:#fff;
font-weight:500;
}

/* ===== CHART ===== */

.chart-box{
margin-top:10px;
height:240px;
}

/* ===== SIGNAL ===== */

.signal{
margin-top:12px;
font-size:13px;
color:#c6d4e5;
}

/* ===== FOOTER ===== */

.footer{
margin-top:10px;
font-size:11px;
color:#6f859f;
}

/* ===== ACTIONS ===== */

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:14px;
}

.action-btn{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.10);
color:#d7e4f3;
padding:8px 12px;
border-radius:8px;
font-size:12px;
cursor:pointer;
}

.panel{
display:none;
margin-top:10px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
border-radius:10px;
padding:10px;
}

.panel-label{
font-size:11px;
color:#8fa6bf;
margin-bottom:8px;
}

.panel-area{
width:100%;
box-sizing:border-box;
background:#06121f;
color:#cfe3f5;
border:1px solid rgba(255,255,255,0.08);
border-radius:8px;
padding:10px;
font-size:11px;
resize:none;
}

.embed-area{
height:84px;
}

.share-area{
height:50px;
}

.panel-actions{
display:flex;
gap:6px;
margin-top:8px;
flex-wrap:wrap;
}

.panel-actions button{
background:none;
border:1px solid rgba(255,255,255,0.10);
color:#d7e4f3;
padding:6px 10px;
border-radius:8px;
font-size:11px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="wrap">

<div class="title">Euro Yield</div>
<div class="subtitle">ECB 10Y sovereign yield (daily)</div>

<div class="metrics" id="metrics"></div>

<div class="controls">
<button class="btn active" onclick="setRange(7, event)">1W</button>
<button class="btn" onclick="setRange(30, event)">1M</button>
<button class="btn" onclick="setRange(90, event)">3M</button>
<button class="btn" onclick="setRange(365, event)">1Y</button>
</div>

<div class="chart-box">
<canvas id="chart"></canvas>
</div>

<div class="signal" id="signal"></div>

<div class="footer">
ECB Data · Daily (T-1)
</div>

<div class="actions" id="actionsBar">
<button class="action-btn" onclick="toggleEmbed()">Embed Euro Yield Chart</button>
<button class="action-btn" onclick="toggleShare()">Share this chart</button>
</div>

<div id="embedBox" class="panel">
<div class="panel-label">Copy this code to embed the chart on your website</div>
<textarea id="embedCode" class="panel-area embed-area" readonly></textarea>
<div class="panel-actions">
<button onclick="copyEmbed()">Copy embed code</button>
</div>
</div>

<div id="shareBox" class="panel">
<div class="panel-label">Share or copy this chart link</div>
<textarea id="shareLink" class="panel-area share-area" readonly></textarea>
<div class="panel-actions">
<button onclick="copyLink()">Copy link</button>
<button onclick="shareTwitter()">X</button>
<button onclick="shareLinkedIn()">LinkedIn</button>
</div>
</div>

</div>

<script>

let chart;
let range = 30;

/* ===== FETCH ECB ===== */

async function fetchECB(){

const url = "https://data-api.ecb.europa.eu/service/data/YC/B.U2.EUR.4F.G_N_A.SV_C_YM.SR_10Y?format=jsondata";

const res = await fetch(url);
const data = await res.json();

const series = Object.values(data.dataSets[0].series)[0];
const obs = series.observations;
const time = data.structure.dimensions.observation[0].values;

const keys = Object.keys(obs).map(Number).sort((a,b)=>a-b);
const sliced = keys.slice(-range);

return sliced.map(k=>({
date:time[k].id,
value:obs[k][0]
}));

}

/* ===== CHART ===== */

function drawChart(data){

if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:data.map(d=>d.date),
datasets:[{
data:data.map(d=>d.value),
borderColor:"#6ee7b7",
borderWidth:2,
pointRadius:0,
tension:0.15
}]
},
options:{
responsive:true,
maintainAspectRatio:false,

interaction:{
mode:"nearest",
intersect:false
},

plugins:{
legend:{display:false},
tooltip:{
backgroundColor:"#0b1f33",
titleColor:"#fff",
bodyColor:"#cfe3f5",
displayColors:false,
callbacks:{
label:ctx=> ctx.raw.toFixed(2)+"%"
}
}
},

scales:{
x:{
ticks:{display:false},
grid:{display:false}
},
y:{
ticks:{
color:"#7f96b2",
callback:v=>v.toFixed(2)+"%"
},
grid:{
color:"rgba(255,255,255,0.05)"
}
}
}
}
});

}

/* ===== SIGNAL ===== */

function signal(change,trend){

if(change > 0 && trend > 0){
return "Yields rising with momentum → tightening conditions";
}

if(change > 0){
return "Short-term increase in yields";
}

if(change < 0 && trend < 0){
return "Yields declining → easing conditions";
}

if(change < 0){
return "Mild pullback in yields";
}

return "Stable yield environment";

}

/* ===== LOAD ===== */

async function load(){

const data = await fetchECB();

const latest = data[data.length-1];
const prev = data[data.length-2];

const change = latest.value - prev.value;
const trend = latest.value - data[0].value;

document.getElementById("metrics").innerHTML = `
Yield: <b>${latest.value.toFixed(2)}%</b>
Daily: <b style="color:${change>0?'#6ee7b7':'#ff6b6b'}">${change.toFixed(2)}</b>
Updated: <b>${latest.date}</b>
`;

drawChart(data);

document.getElementById("signal").innerText = signal(change,trend);

}

/* ===== RANGE ===== */

function setRange(r, ev){

range = r;

document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
ev.target.classList.add("active");

load();

}

/* ===== EMBED ===== */

function toggleEmbed(){
const box = document.getElementById("embedBox");
const share = document.getElementById("shareBox");

share.style.display = "none";
box.style.display = box.style.display === "block" ? "none" : "block";

document.getElementById("embedCode").value =
`<iframe src="https://botapi33.github.io/euro-yield-dashboard/"
width="100%"
height="320"
style="border:none;border-radius:10px;overflow:hidden;"
loading="lazy">
</iframe>`;
}

function copyEmbed(){
const el = document.getElementById("embedCode");
el.select();
el.setSelectionRange(0, 99999);
document.execCommand("copy");
}

/* ===== SHARE ===== */

function toggleShare(){
const box = document.getElementById("shareBox");
const embed = document.getElementById("embedBox");

embed.style.display = "none";
box.style.display = box.style.display === "block" ? "none" : "block";

document.getElementById("shareLink").value = window.location.href;
}

function copyLink(){
const el = document.getElementById("shareLink");
el.select();
el.setSelectionRange(0, 99999);
document.execCommand("copy");
}

function shareTwitter(){
const url = encodeURIComponent(window.location.href);
const text = encodeURIComponent("Euro Area 10Y Yield – Live Chart");
window.open(`https://twitter.com/intent/tweet?url=${url}&text=${text}`, "_blank");
}

function shareLinkedIn(){
const url = encodeURIComponent(window.location.href);
window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${url}`, "_blank");
}

load();

</script>

</body>
</html>
