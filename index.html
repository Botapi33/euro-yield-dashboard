<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BondStats | Euro Yield</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Inter,system-ui;
background:#06121f;
color:#e6edf5;
}

.wrap{
max-width:880px;
margin:auto;
padding:20px;
}

.title{
font-size:20px;
font-weight:600;
}

.subtitle{
font-size:12px;
color:#7f96b2;
margin-top:3px;
}

.metrics{
display:flex;
gap:20px;
margin-top:12px;
font-size:13px;
color:#9fb2c9;
flex-wrap:wrap;
}

.metrics b{
color:#fff;
font-weight:500;
}

.controls{
margin-top:12px;
}

.btn{
background:none;
border:none;
color:#7f96b2;
font-size:12px;
margin-right:10px;
cursor:pointer;
}

.btn.active{
color:#fff;
font-weight:500;
}

.chart-box{
margin-top:10px;
height:240px;
}

.signal{
margin-top:12px;
font-size:13px;
color:#c6d4e5;
}

.footer{
margin-top:10px;
font-size:11px;
color:#6f859f;
}

/* ACTIONS */

.actions{
display:flex;
gap:10px;
margin-top:14px;
}

.action-btn{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.10);
color:#d7e4f3;
padding:8px 12px;
border-radius:8px;
font-size:12px;
cursor:pointer;
}

.panel{
display:none;
margin-top:10px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
border-radius:10px;
padding:10px;
}

.panel-area{
width:100%;
background:#06121f;
color:#cfe3f5;
border:1px solid rgba(255,255,255,0.08);
border-radius:8px;
padding:10px;
font-size:11px;
resize:none;
}

.embed-area{height:80px;}
.share-area{height:50px;}

.panel-actions{
margin-top:8px;
display:flex;
gap:6px;
}

.panel-actions button{
background:none;
border:1px solid rgba(255,255,255,0.1);
color:#d7e4f3;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:11px;
}

</style>
</head>

<body>

<div class="wrap">

<div class="title">Euro Yield</div>
<div class="subtitle">ECB 10Y sovereign yield (daily)</div>

<div class="metrics" id="metrics"></div>

<div class="controls">
<button class="btn active" onclick="setRange(7, event)">1W</button>
<button class="btn" onclick="setRange(30, event)">1M</button>
<button class="btn" onclick="setRange(90, event)">3M</button>
<button class="btn" onclick="setRange(365, event)">1Y</button>
</div>

<div class="chart-box">
<canvas id="chart"></canvas>
</div>

<div class="signal" id="signal"></div>

<div class="footer">
ECB Data · Daily (T-1)
</div>

<div class="actions">
<button class="action-btn" onclick="toggleEmbed()">Embed Euro Yield Chart</button>
<button class="action-btn" onclick="toggleShare()">Share this chart</button>
</div>

<div id="embedBox" class="panel">
<textarea id="embedCode" class="panel-area embed-area" readonly></textarea>
<div class="panel-actions">
<button onclick="copyEmbed()">Copy embed</button>
</div>
</div>

<div id="shareBox" class="panel">
<textarea id="shareLink" class="panel-area share-area" readonly></textarea>
<div class="panel-actions">
<button onclick="copyLink()">Copy</button>
<button onclick="shareTwitter()">X</button>
<button onclick="shareLinkedIn()">LinkedIn</button>
</div>
</div>

</div>

<script>

let chart;
let range = 30;

/* FETCH ECB */

async function fetchECB(){
const url = "https://data-api.ecb.europa.eu/service/data/YC/B.U2.EUR.4F.G_N_A.SV_C_YM.SR_10Y?format=jsondata";
const res = await fetch(url);
const data = await res.json();

const series = Object.values(data.dataSets[0].series)[0];
const obs = series.observations;
const time = data.structure.dimensions.observation[0].values;

const keys = Object.keys(obs).map(Number).sort((a,b)=>a-b);
const sliced = keys.slice(-range);

return sliced.map(k=>({
date:time[k].id,
value:obs[k][0]
}));
}

/* CHART */

function drawChart(data){
if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:data.map(d=>d.date),
datasets:[{
data:data.map(d=>d.value),
borderColor:"#6ee7b7",
borderWidth:2,
pointRadius:0,
tension:0.15
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{display:false}},
scales:{
x:{display:false},
y:{ticks:{color:"#7f96b2"}}
}
}
});
}

/* SIGNAL */

function signal(change,trend){
if(change>0&&trend>0)return "Yields rising → tightening";
if(change>0)return "Short-term increase";
if(change<0&&trend<0)return "Yields falling → easing";
if(change<0)return "Mild pullback";
return "Stable";
}

/* LOAD */

async function load(){
const data = await fetchECB();

const latest = data[data.length-1];
const prev = data[data.length-2];

const change = latest.value - prev.value;
const trend = latest.value - data[0].value;

document.getElementById("metrics").innerHTML = `
Yield: <b>${latest.value.toFixed(2)}%</b>
Daily: <b style="color:${change>0?'#6ee7b7':'#ff6b6b'}">${change.toFixed(2)}</b>
Updated: <b>${latest.date}</b>
`;

drawChart(data);
document.getElementById("signal").innerText = signal(change,trend);
}

/* RANGE */

function setRange(r, ev){
range = r;
document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
ev.target.classList.add("active");
load();
}

/* EMBED FIXED */

function toggleEmbed(){
const box = document.getElementById("embedBox");
const share = document.getElementById("shareBox");

share.style.display="none";
box.style.display = box.style.display==="block"?"none":"block";

document.getElementById("embedCode").value =
`<iframe src="https://bondstats.org/euro-yield" width="100%" height="320" style="border:none;border-radius:10px;"></iframe>`;
}

function copyEmbed(){
const el=document.getElementById("embedCode");
el.select();
document.execCommand("copy");
}

/* SHARE FIXED */

const SHARE_URL = "https://bondstats.org/euro-yield";

function toggleShare(){
const box=document.getElementById("shareBox");
const embed=document.getElementById("embedBox");

embed.style.display="none";
box.style.display = box.style.display==="block"?"none":"block";

document.getElementById("shareLink").value = SHARE_URL;
}

function copyLink(){
const el=document.getElementById("shareLink");
el.select();
document.execCommand("copy");
}

function shareTwitter(){
const url = encodeURIComponent(SHARE_URL);
const text = encodeURIComponent("Euro Area 10Y Yield – Live Chart");
window.open(`https://twitter.com/intent/tweet?url=${url}&text=${text}`,"_blank");
}

function shareLinkedIn(){
const url = encodeURIComponent(SHARE_URL);
window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${url}`,"_blank");
}

load();

</script>

</body>
</html>
